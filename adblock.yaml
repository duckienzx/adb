# =============================================================================
# FILE: stash_adblock_rules.yaml
# MÔ TẢ: File cấu hình rules chặn quảng cáo cho ứng dụng Stash (iOS/macOS).
# SỬ DỤNG: Copy toàn bộ nội dung file này vào cuối file cấu hình chính của Stash.
#          Hoặc lưu thành file .yaml riêng và import vào Stash.
# NGUYÊN LÝ: Dùng rule DOMAIN-SUFFIX và DOMAIN-KEYWORD để REJECT traffic đến máy chủ quảng cáo.
# CẬP NHẬT: 2026-06-20 - Danh sách domain tổng hợp từ AdAway, StevenBlack, Yoyo.
# =============================================================================

# =============================================================================
# ĐỊNH NGHĨA PROXY GROUP (Bắt buộc trong Stash config)
# =============================================================================
proxy-groups:
  - name: "AdBlock"
    type: reject
    # Group này sẽ từ chối toàn bộ kết nối khớp rule bên dưới
    # Không cần proxy thực tế, Stash tự động REJECT

# =============================================================================
# ĐỊNH NGHĨA RULES (Chặn quảng cáo)
# =============================================================================
rules:
